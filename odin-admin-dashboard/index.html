<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Odin Project Admin Dashboard using CSS Grid"
    />
    <meta
      name="keywords"
      content="HTML, CSS, Grid, Admin Dashboard, Odin Project"
    />
    <meta name="author" content="Chris Sykas" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/assets/styles/styles.css" />
    <link rel="icon" href="/assets/images/favicon/favicon.ico" />
  </head>
  <body>
    <h1>Admin Dashboard</h1>
    <header class="header-top">
      <div class="search-bar">
        <img
          src="/assets/images/icons/magnify.svg"
          width="18"
          height="18"
          alt="Search Icon"
          class="search-icon"
        />
        <input type="text" placeholder="Search..." class="search-input" />
      </div>
      <div class="profile">
        <img
          src="/assets/images/icons/bell-ring.svg"
          width="18"
          height="18"
          alt="Notifications Icon"
          class="notification-icon"
        />
        <img
          src="/assets/images/profile/chris.svg"
          alt="profile picture"
          width="32"
          height="32"
          class="profile-picture"
        />
        <p class="profile-name">Chris Sykas</p>
      </div>
    </header>
    <header class="header-bottom">
      <div class="profile-info">
        <img
          src="/assets/images/profile/chris.svg"
          alt="profile picture"
          width="32"
          height="32"
          class="profile-picture"
        />
        <p class="greeting">Hi there,</p>
        <p class="name">Chris Sykas (@chris)</p>
      </div>
      <div class="action-buttons">
        <button class="btn">New</button>
        <button class="btn">Upload</button>
        <button class="btn">Share</button>
      </div>
    </header>
    <main class="main">
      <div class="sidebar">
        <nav class="navbar">
          <a href="#">Dashboard</a>
        </nav>
      </div>
    </main>
  </body>
</html>
