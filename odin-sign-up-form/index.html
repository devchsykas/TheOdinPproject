<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Odin Sign Up Form Project" />
    <meta name="keywords" content=" HTML, CSS" />
    <meta name="author" content="Chris Sykas" />
    <title>Odin Sign Up Form</title>
    <link rel="stylesheet" href="/assets/styles/main.css" />
  </head>
  <body>
    <section class="signup-form-left-column">
      <div class="logo-container">
        <img src="/assets/images/odin-lined-logo.png" alt="Odin Logo" />
        <h1>Odin</h1>
      </div>
    </section>
    <section class="signup-form-right-column">
      <header class="signup-form-header">
        <h2>
          This is not a real online service! You know you need something like
          this in your life to help you realize your deepest dreams. Sign up
          <em>now</em> to get started.
        </h2>
        <h3>You <em>know</em> you want to.</h3>
      </header>
      <form action="#" method="post" class="signup-form">
        <h3>Let's do this!</h3>
        <div class="form-pair">
          <div class="form-row">
            <label for="first-name">First Name</label>
            <input
              type="text"
              name="first-name"
              id="first-name"
              placeholder="Joe"
              title="First Name"
              required
            />
          </div>
          <div class="form-row">
            <label for="last-name">Last Name</label>
            <input
              type="text"
              name="last-name"
              id="last-name"
              placeholder="Doe"
              title="Last Name"
              required
            />
          </div>
        </div>
        <div class="form-pair">
          <div class="form-row">
            <label for="email">Email</label>
            <input
              type="email"
              name="email"
              id="email"
              placeholder="joe@example.com"
              pattern="^[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,4}$"
              title="joe@example.com"
              required
            />
          </div>
          <div class="form-row">
            <label for="phone">Phone Number</label>
            <input
              type="tel"
              name="phone"
              id="phone"
              pattern="[0-9]{3} [0-9]{3} [0-9]{4}"
              maxlength="12"
              placeholder="888 888 8888"
              title="xxx xxx xxxx"
              required
            />
          </div>
        </div>
        <div class="form-pair">
          <div class="form-row">
            <label for="password">Password</label>
            <input
              type="password"
              name="password"
              id="password"
              pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
              title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters"
              placeholder="Password"
              required
            />
          </div>
          <div class="form-row">
            <label for="confirm-password">Confirm Password</label>
            <input
              type="password"
              name="confirm-password"
              id="confirm-password"
              pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
              title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters"
              placeholder="Confirm Password"
              required
            />
          </div>
        </div>
      </form>
      <div class="form-actions">
        <div class="form-btn">
          <button type="submit">Create Account</button>
        </div>
        <div class="form-note">
          <p>Already have an account?<a href="#"> Log in</a></p>
        </div>
      </div>
    </section>
  </body>
</html>
