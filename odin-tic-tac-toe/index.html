<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta
      name="description"
      content="Tic Tac Toe game built with JavaScript, HTML, and CSS as part of The Odin Project curriculum."
    />
    <meta
      name="keywords"
      content="Tic Tac Toe, JavaScript, HTML, CSS, The Odin Project"
    />
    <meta name="author" content="Chris Sykas" />
    <title>Odin Tic Tac Toe</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/favicon_io/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon_io/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon_io/favicon-16x16.png"
    />
    <link rel="manifest" href="/favicon_io/site.webmanifest" />
  </head>
  <body>
    <header class="header">
      <h1 class="header-title">Tic Tac Toe</h1>
      <p class="header-subtitle">
        Enjoy a game between you and Odin, the god of Tic Tac Toe!
      </p>
    </header>
    <main class="main">
      <section class="game-container" arial-labelledby="game-title">
        <div class="board" id="board" aria-label="Tic Tac Toe board">
          <button class="cell" data-index="0"></button>
          <button class="cell" data-index="1"></button>
          <button class="cell" data-index="2"></button>
          <button class="cell" data-index="3"></button>
          <button class="cell" data-index="4"></button>
          <button class="cell" data-index="5"></button>
          <button class="cell" data-index="6"></button>
          <button class="cell" data-index="7"></button>
          <button class="cell" data-index="8"></button>
        </div>
        <div class="status" id="status">Player X's turn</div>
        <button type="button" class="restart-btn" id="restart-btn">
          Restart
        </button>
      </section>
    </main>
  </body>
</html>
